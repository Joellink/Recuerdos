<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.contenedor{
    background:white;
    padding:30px;
    border-radius:20px;
    max-width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#e91e63;
}

p{
    font-size:18px;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#e91e63;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

#mensaje{
    display:none;
    margin-top:20px;
    color:#444;
}
</style>
</head>

<body>

<div class="contenedor">
<h1>Para ti ❤️</h1>

<p>
Hay personas que llegan a nuestra vida y dejan recuerdos muy bonitos.
</p>

<button onclick="mostrar()">
Abrir ❤️
</button>

<div id="mensaje">
<p>
Solo quería regalarte un pequeño detalle para sacarte una sonrisa.<br><br>
Gracias por todos los momentos compartidos. 💖
</p>
</div>

</div>

<script>
function mostrar(){
document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
